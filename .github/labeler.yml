docker:
  - changed-files:
    - any-glob-to-any-file:
      - "build/**"
helm:
  - changed-files:
    - any-glob-to-any-file:
      - "deploy/**"
documentation:
  - changed-files:
    - any-glob-to-any-file:
      - "doc/**"
      - "**/*.md"
ci/cd:
  - all:
    - changed-files:
      - any-glob-to-any-file:
        - ".github/**"
      - all-globs-to-all-files:
        - "!.github/instructions/**"
        - "!.github/prompts/**"
        - "!.github/copilot-instructions.md"
