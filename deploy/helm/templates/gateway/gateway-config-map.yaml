{{- if .Values.otel.gateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.fullname" (tuple . "-gateway-config") }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: swo-k8s-collector
{{ include "common.labels" . | indent 4 }}
  annotations:
{{ include "common.annotations" . | indent 4 }}
data:
  gateway.config: |
{{- $main := tpl (.Files.Get "gateway-collector-config.yaml") . | fromYaml }}
{{- $traces := tpl (.Files.Get "gateway-collector-config-traces.yaml") . | fromYaml }}
{{ merge $main $traces | toYaml | indent 8 }}
{{- end }}