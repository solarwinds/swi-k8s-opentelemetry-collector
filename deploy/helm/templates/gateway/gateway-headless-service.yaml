{{- if .Values.otel.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: swo-gateway-headless
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "common.labels" . | indent 4 }}
  annotations:
{{ include "common.annotations" . | indent 4 }}
spec:
  clusterIP: None
  type: ClusterIP
  ports:
  - name: otlp-grpc
    port: {{ .Values.otel.gateway.otlp_endpoint.port }}
    targetPort: otlp-grpc
    protocol: TCP
  - name: otlp-http
    port: {{ .Values.otel.gateway.otlp_endpoint.http_port }}
    targetPort: otlp-http
    protocol: TCP
{{- if .Values.otel.gateway.telemetry.metrics.enabled }}
  - name: metrics
    port: {{ (split ":" .Values.otel.gateway.telemetry.metrics.address)._1 }}
    targetPort: metrics
    protocol: TCP
{{- end }}
  selector:
    app: {{ include "common.fullname" (tuple . "-gateway") }}
{{- end }}
