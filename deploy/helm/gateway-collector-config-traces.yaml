# MERGE CONTRACT: This file is merged into the gateway config via `merge $main $traces`.
# $main wins on key conflicts. This file must NOT define pipeline keys that also exist in
# gateway-collector-config.yaml (currently: all traces/* pipelines are owned here).

exporters:
{{- if .Values.otel.gateway.tailSampling.enabled }}
  # Load balancing exporter for tail-sampling
  # Routes traces by traceID to specific gateway replicas via headless service
  loadbalancing:
    routing_key: "traceID"
    protocol:
      otlp:
        timeout: {{ .Values.otel.gateway.tailSampling.loadBalancing.timeout }}
        tls:
          insecure: true
        retry_on_failure:
          enabled: {{ .Values.otel.gateway.retry_on_failure.enabled }}
          initial_interval: {{ .Values.otel.gateway.retry_on_failure.initial_interval }}
          max_interval: {{ .Values.otel.gateway.retry_on_failure.max_interval }}
          max_elapsed_time: {{ .Values.otel.gateway.retry_on_failure.max_elapsed_time }}
        sending_queue:
          enabled: {{ .Values.otel.gateway.sending_queue.enabled }}
          num_consumers: {{ .Values.otel.gateway.sending_queue.num_consumers }}
          queue_size: {{ .Values.otel.gateway.sending_queue.queue_size }}
    resolver:
      # k8s resolver discovers gateway pod endpoints via the Kubernetes API (watch-based),
      # which is more reliable in K8s environments than DNS-based discovery.
      k8s:
        service: swo-gateway-headless.{{ .Release.Namespace }}
        ports:
          - {{ .Values.otel.gateway.otlp_endpoint.port }}
        return_hostnames: true
{{- end }}

processors:
{{- if .Values.otel.gateway.tailSampling.enabled }}
  resource/traces-clean-temporary-attributes:
    attributes:
      - key: sw.loadbalanced
        action: delete

  # Transform processor to mark traces that have been load-balanced
  # This marker attribute is used by the routing connector to distinguish
  # between first-pass (external) and second-pass (load-balanced) traces
  transform/mark-loadbalanced:
    trace_statements:
      - context: resource
        statements:
          - set(resource.attributes["sw.loadbalanced"], "true")

  # Tail-sampling processor - applies sampling policies to traces
  # Configuration is passed through directly from values.yaml to support
  # all tail_sampling processor options (16+ policy types)
  tail_sampling:
    decision_wait: {{ .Values.otel.gateway.tailSampling.decision_wait }}
    num_traces: {{ .Values.otel.gateway.tailSampling.num_traces }}
    expected_new_traces_per_sec: {{ .Values.otel.gateway.tailSampling.expected_new_traces_per_sec }}
    decision_cache:
{{ toYaml .Values.otel.gateway.tailSampling.decision_cache | indent 6 }}
    policies:
{{ toYaml .Values.otel.gateway.tailSampling.policies | indent 6 }}
{{- end }}

connectors:
{{- if .Values.otel.gateway.tailSampling.enabled }}
  # Routing connector for tail-sampling architecture
  # Routes traces based on the presence of sw.loadbalanced attribute
  # - Traces without attribute (first pass) → traces/loadbalance pipeline
  # - Traces with attribute (second pass) → traces/tailsampling pipeline
  routing/traces:
    default_pipelines: [traces/loadbalance]
    table:
      - context: resource
        pipelines:
          - traces/tailsampling
        condition: resource.attributes["sw.loadbalanced"] == "true"
{{- end }}

service:
  pipelines:
{{- if .Values.otel.gateway.tailSampling.enabled }}
    # Tail-sampling: Attribute-based routing architecture
    # Single OTLP receiver with routing connector for first/second pass separation

    # Entry point: receives all traces from external sources and load balancer
    traces/receive:
      receivers:
        - otlp
      processors:
        - memory_limiter
      exporters:
        - routing/traces

    # First pass: add marker attribute and route by traceID to gateway replicas
    traces/loadbalance:
      receivers:
        - routing/traces
      processors:
        - transform/mark-loadbalanced
      exporters:
        - loadbalancing

    # Second pass: apply tail-sampling policies and export to SWO
    traces/tailsampling:
      receivers:
        - routing/traces
      processors:
        - memory_limiter
        - tail_sampling
        - k8s_attributes
        - resource
        - resource/traces-clean-temporary-attributes
        - transform/scope
        - batch
      exporters:
        - otlp_grpc
{{- else }}
    # Standard traces pipeline (no tail-sampling)
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - k8s_attributes
        - resource
        - transform/scope
        - batch
      exporters:
        - otlp_grpc
{{- end }}
