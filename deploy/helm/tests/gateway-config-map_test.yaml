suite: Test for gateway-config-map
templates:
  - gateway/gateway-config-map.yaml
  - common-env-config-map.yaml
chart:
  version: 1.0.0
tests:
  - it: Gateway config should match snapshot when using default values
    template: gateway/gateway-config-map.yaml
    asserts:
      - matchSnapshot:
          path: data
  - it: Gateway config should not exist when it's disabled
    template: gateway/gateway-config-map.yaml
    set:
      otel.gateway.enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: Pprof should not be in the configuration by default
    template: gateway/gateway-config-map.yaml
    asserts:
      - notMatchRegex:
          path: data["gateway.config"]
          pattern: "pprof"
  - it: Pprof should be in the configuration when enabled
    template: gateway/gateway-config-map.yaml
    set:
      diagnostics.profiling.enabled: true
    asserts:
      - matchRegex:
          path: data["gateway.config"]
          pattern: "pprof"

  - it: k8s resolver should be used for load balancing when tailSampling is enabled
    template: gateway/gateway-config-map.yaml
    set:
      otel.gateway.tailSampling.enabled: true
    asserts:
      - matchRegex:
          path: data["gateway.config"]
          pattern: "k8s:"
      - notMatchRegex:
          path: data["gateway.config"]
          pattern: "dns:"

  - it: telemetry resource attributes should be present when resourceAttributes is enabled
    template: gateway/gateway-config-map.yaml
    set:
      otel.gateway.telemetry.resourceAttributes.enabled: true
    asserts:
      - matchRegex:
          path: data["gateway.config"]
          pattern: "sw\\.otelcol\\.collector\\.name"
      - matchRegex:
          path: data["gateway.config"]
          pattern: "sw\\.otelcol\\.collector\\.entity_creation"

  - it: telemetry resource attributes should not be present by default
    template: gateway/gateway-config-map.yaml
    asserts:
      - notMatchRegex:
          path: data["gateway.config"]
          pattern: "sw\\.otelcol\\.collector\\.name"