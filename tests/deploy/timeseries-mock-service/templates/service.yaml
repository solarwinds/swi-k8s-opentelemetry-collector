apiVersion: v1
kind: Service
metadata:
  name: timeseries-mock-service
spec:
  selector:
    app: timeseries-mock-service
  ports:
    - protocol: TCP
      port: {{ .Values.otel.port }}
      targetPort: otlp
      name: grpc
    - protocol: TCP
      port: 9083
      targetPort: otlp-http
      name: http
    - port: 8080
      targetPort: metrics
      name: metrics
{{- if .Values.fileProvider.enabled }}
    - protocol: TCP
      port: {{ .Values.fileProvider.port }}
      targetPort: html
      name: html
{{- end }}
